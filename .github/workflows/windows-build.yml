name: Windows Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "src/**"
      - "libs/**"
      - "state/**"
      - "utils/**"
      - "assets/**"
      - "soundpacks/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "Dioxus.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "style.css"
      - ".github/workflows/windows-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "libs/**"
      - "state/**"
      - "utils/**"
      - "assets/**"
      - "soundpacks/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "Dioxus.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "style.css"
      - ".github/workflows/windows-build.yml"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build Windows executable
        run: cargo build --release

      - name: Build Windows bundle
        run: dx bundle --release

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mechvibes-dx-windows-exe
          path: target/release/mechvibes-dx.exe
          if-no-files-found: error

      - name: Upload bundled app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mechvibes-dx-windows-bundle
          path: |
            bundle/
            dist/
          if-no-files-found: warn
